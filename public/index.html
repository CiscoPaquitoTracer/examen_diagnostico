<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Estudiantes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Gestión de Estudiantes</h1>
        
        <!-- Formulario -->
        <div class="form-section">
            <h2>Agregar/Editar Estudiante</h2>
            <form id="estudiante-form">
                <input type="hidden" id="id-estudiante">
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" placeholder="Nombre completo" required>
                </div>
                <div class="form-group">
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" placeholder="Edad" required>
                </div>
                <div class="form-group">
                    <label for="carrera">Carrera:</label>
                    <input type="text" id="carrera" placeholder="Carrera" required>
                </div>
                <div class="form-group">
                    <label for="cuatrimestre">Cuatrimestre:</label>
                    <input type="number" id="cuatrimestre" placeholder="Cuatrimestre" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="reset" class="btn btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
                </div>
            </form>
        </div>

        <!-- Tabla de estudiantes -->
        <div class="table-section">
            <h2>Lista de Estudiantes</h2>
            <table id="estudiantes-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Edad</th>
                        <th>Carrera</th>
                        <th>Cuatrimestre</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
